  # 默认DNS服务器
  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  # default-nameserver:
    # - 218.2.2.2
  # 专用于节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
  # proxy-server-nameserver:
    # - https://223.5.5.5/dns-query
  # DNS 主要域名配置
  # 支持 UDP，TCP，DoT，DoH，DoQ
  # 这部分为主要 DNS 配置，影响所有直连，确保使用对大陆解析精准的 DNS
  # namesever尽量用运营商提供的DNS
  # nameserver:
    # - 218.2.2.2
    # - 218.4.4.4

dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  # fake-ip-range6: fdfe:dcba:9876::1/64  # 开启 IPv6 时启用
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "rule-set:fakeipfilter_class"
 
# 出站策略
# 锚点
# 注意锚点必须放在引用的上方，可以集中把锚点全部放yaml的顶部。
# pr: &pr {type: select, proxies: [🚀 默认代理, 🇭🇰 香港手故自故转, 🇹🇼 台湾手故自故转, 🇯🇵 日本手故自故转, 🇸🇬 新加坡手故自故转, 🇰🇷 韩国手故自故转, 🇺🇲 美国手故自故转, 🇭🇰 香港自动, 🇹🇼 台湾自动, 🇯🇵 日本自动, 🇸🇬 新加坡自动, 🇰🇷 韩国自动, 🇺🇲 美国自动, 🇭🇰 香港手动, 🇹🇼 台湾手动, 🇯🇵 日本手动, 🇸🇬 新加坡手动, 🇰🇷 韩国手动, 🇺🇲 美国手动, 🌐 所有手故自故转, 🌐 所有自动, 🌐 所有手动, 直连, 拒绝]}
# proxy-groups:
  # 代理链，目前 relay 可以支持 udp 的只有 vmess/vless/trojan/ss/ssr/tuic
  # wireguard 目前不支持在 relay 中使用，请使用 proxy 中的 dialer-proxy 配置项
  # Traffic: mihomo <-> http <-> vmess <-> ss1 <-> ss2 <-> Internet
  # url-test 自动选择，将按照 url 测试结果使用延迟最低节点
  # fallback 故障转移，将按照 url 测试结果按照节点顺序选择
