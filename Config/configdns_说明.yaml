# DNS防泄露版本
# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。

# 机场订阅
# proxy-providers:
  # 机场名称
  # Airport1:
    # 机场订阅的URL地址
    # url: "机场订阅"
    # 获取订阅的方式“http”为从互联网获取。
    # type: http
    # 更新间隔时间（秒）86400为24小时
    # interval: 86400
    # 机场健康检查
    # health-check:
      # enable: true
      # 自动测延迟地址
      # url: https://www.gstatic.com/generate_204
      # 自动测延迟间隔时间（秒）300为5分钟
      # interval: 300
    # 拉取机场订阅使用的代理节点名称“DIRECT”为直连
    # proxy: 直连
    # override:
      # 节点名称前缀
      # additional-prefix: "前缀 |"
      # 节点名称后缀
      # additional-suffix: "| 后缀"
    # 拉取订阅请求头
    # header:
      # UA一般使用"Clash.meta"
      # User-Agent:
      # - "Clash"
      # - "mihomo"
      # - "Clash.meta"
    # 额外参数
    # override:
      # 定义机场打开udp支持。
      # udp: true
      # 定义下载速率
      # down: "50 Mbps"
      # 定义上传速率
      # up: "10 Mbps"
      # 跳过证书验证
      # skip-cert-verify: true
  # 第二机场名称
  # Airport2:
    # 第二机场订阅的URL地址
    # url: "机场2订阅地址"
    # 获取订阅的方式“http”为从互联网获取。
    # type: http
    # 更新间隔时间（秒）86400为24小时
    # interval: 86400
    # 机场健康检查
    # health-check:
      # enable: true
      # 自动测延迟地址
      # url: https://www.gstatic.com/generate_204
      # 自动测延迟间隔时间（秒）300为5分钟
      # interval: 300
    # 拉取机场订阅使用的代理节点名称“DIRECT”为直连
    # proxy: 🚀 默认代理
    # override:
      # 节点名称前缀
      # additional-prefix: "前缀 |"
      # 节点名称后缀
      # additional-suffix: "| 后缀"
# 全局UA
# global-ua: clash.meta

proxy-providers:
  Airport1:
    url: "机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连
  Airport2:
    url: "机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🚀 默认代理

# 节点信息
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# 全局配置
# HTTP(S) 代理服务器端口
# port: 7890
# SOCKS5 代理端口
# socks-port: 7891
# 透明代理端口，用于 Linux 和 MacOS
# redir-port: 7892
# HTTP(S) 和 SOCKS 代理混合端口
# mixed-port: 7893
# Linux的透明代理服务器端口（TProxy TCP和TProxy UDP）
# tproxy-port: 7894
# 允许局域网连接
# allow-lan: true
# 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址
# bind-address: "*"
# 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录
# ipv6: false
# 统一延迟
# unified-delay: true
# TCP 并发连接所有 IP, 将使用最快握手的 TCP
# tcp-concurrent: true
# 日志等级 silent/error/warning/info/debug
# log-level: warning
# find-process-mode 有3个值：always, strict, off
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
# find-process-mode: 'off'
# 全局 TLS 指纹，优先低于 proxy 内的 client-fingerprint
# 可选： "chrome","firefox","safari","ios","random","none" options.
# global-client-fingerprint: chrome
# 移动设备省电相关
# TCP保持活动间隔
# keep-alive-idle: 600
# keep-alive-interval: 15
# disable-keep-alive: false # 目前在android端强制为true
# 存储 select 选择记录
# profile:
  # 节点缓存
  # store-selected: true
  # fake-ip缓存
  # store-fake-ip: true

mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 数据库
# geodata-loader: memconservative/standard
# geodata-mode: true/false
# geo-auto-update: false # 是否自动更新 geodata
# geo-update-interval: 24 # 更新间隔，单位：小时
# 自定义 geodata url
# geox-url:
  # geoip: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  # geosite: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  # mmdb: "https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  # asn: "https://gh-proxy.com/https://github.com/xishang0128/geoip/releases/download/latest/Geolite2-ASN.mmdb"

