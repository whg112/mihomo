# 嗅探（fakeip下其实可以不用嗅探）
# sniffer:
  # enable: true
  # 嗅探类型，协议和端口
  # sniff: # TLS 和 QUIC 默认如果不配置 ports 默认嗅探 443
    # 默认嗅探 80
    # HTTP: # 需要嗅探的端口
      # ports: [80, 8080-8880]
      # override-destination: true
    # TLS:
      # ports: [443, 8443]
    # QUIC:
      # ports: [443, 8443]
  # 强制嗅探
  # force-domain:
    # - "+.v2ex.com"
  # 跳过忽略嗅探
  # skip-domain:
    # - "+.baidu.com"

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
# 裸核必须设置，OpenClash、NiKKi插件自动设置
# tun:
# 开启TUN模式
  # enable: true
  # TUN模式协议栈，3个模式“system/gvisor/mixed”
  # stack: mixed
  # 需要劫持的 DNS
  # dns-hijack: ["any:53", "tcp://any:53"]
  # 使用nikki，混入全部不修改的情况，开启接口指定为nikki
  # device: nikki
  # 使用仅内核自行修改下面三项为true
  # 自动路由，配置路由表
  # auto-route: true
  # 自动配置 iptables 以重定向 TCP 连接。仅支持 Linux。带有 auto-redirect 的 auto-route 现在可以在路由器上按预期工作，无需干预。
  # auto-redirect: true
  # 自动识别出口网卡
  # auto-detect-interface: true

tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  # 使用nikki，混入全部不修改的情况，开启接口指定为nikki
  # device: nikki
  # 使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
# dns:
  # enable: true # 关闭将使用系统 DNS
  # 监听端口，nikki为1053，openclash为7874，插件自动设置端口，裸核指定
  # listen: 0.0.0.0:1053
  # 是否解析IPv6地址 false 将返回 AAAA 的空结果
  # ipv6: false
  # 是否遵循路由规则
  # 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
  # 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
  # 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
  # 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
  # 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
